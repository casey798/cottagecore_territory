AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GroveWars - Clan-based territory capture game backend

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  AllowedEmailDomain:
    Type: String
    Description: Allowed email domain for signup (e.g. college.edu)
  HmacSecret:
    Type: String
    Description: HMAC secret for QR code signing
    NoEcho: true

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  IsNotProd: !Not [!Equals [!Ref Stage, prod]]

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
        ALLOWED_EMAIL_DOMAIN: !Ref AllowedEmailDomain
        HMAC_SECRET: !Ref HmacSecret
        AWS_REGION_NAME: ap-south-1
        USERS_TABLE: !Ref UsersTable
        CLANS_TABLE: !Ref ClansTable
        LOCATIONS_TABLE: !Ref LocationsTable
        DAILY_CONFIG_TABLE: !Ref DailyConfigTable
        PLAYER_ASSIGNMENTS_TABLE: !Ref PlayerAssignmentsTable
        GAME_SESSIONS_TABLE: !Ref GameSessionsTable
        PLAYER_LOCKS_TABLE: !Ref PlayerLocksTable
        CAPTURED_SPACES_TABLE: !Ref CapturedSpacesTable
        ASSET_CATALOG_TABLE: !Ref AssetCatalogTable
        PLAYER_ASSETS_TABLE: !Ref PlayerAssetsTable
        SPACE_DECORATIONS_TABLE: !Ref SpaceDecorationsTable
        MAP_CALIBRATION_TABLE: !Ref MapCalibrationTable
        ADMIN_NOTIFICATIONS_TABLE: !Ref AdminNotificationsTable
        WS_CONNECTIONS_TABLE: !Ref WsConnectionsTable
        ASSETS_BUCKET: !Ref AssetsBucket
        CHECKINS_TABLE: !Ref CheckInsTable
        ADMIN_AUDIT_TABLE: !Ref AdminAuditTable
        LOCATION_MASTER_CONFIG_TABLE: !Ref LocationMasterConfigTable
        CLUSTER_WEIGHT_CONFIG_TABLE: !Ref ClusterWeightConfigTable
        CLUSTERING_RUNS_TABLE: !Ref ClusteringRunsTable

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # REST API Gateway
  # =========================================================================
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub grovewars-${Stage}-api
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: FirebaseAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          FirebaseAuthorizer:
            FunctionArn: !GetAtt LambdaAuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
        AllowOrigin: "'*'"
      GatewayResponses:
        UNAUTHORIZED:
          StatusCode: 401
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
          ResponseTemplates:
            application/json: '{"success":false,"error":{"code":"UNAUTHORIZED","message":"Unauthorized"}}'
        ACCESS_DENIED:
          StatusCode: 403
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
          ResponseTemplates:
            application/json: '{"success":false,"error":{"code":"FORBIDDEN","message":"Access denied"}}'
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  # =========================================================================
  # WebSocket API Gateway
  # =========================================================================
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub grovewars-${Stage}-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Stage
      AutoDeploy: true

  # $connect route
  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WsConnectIntegration}

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:ap-south-1:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    DependsOn: WebSocketStage
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:ap-south-1:${AWS::AccountId}:${WebSocketApi}/*/$connect

  # $disconnect route
  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${WsDisconnectIntegration}

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:ap-south-1:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    DependsOn: WebSocketStage
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:ap-south-1:${AWS::AccountId}:${WebSocketApi}/*/$disconnect

  # $default route
  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub integrations/${WsDefaultIntegration}

  WsDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:ap-south-1:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations

  WsDefaultPermission:
    Type: AWS::Lambda::Permission
    DependsOn: WebSocketStage
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDefaultFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:ap-south-1:${AWS::AccountId}:${WebSocketApi}/*/$default

  # =========================================================================
  # S3 Bucket
  # =========================================================================
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub grovewars-${Stage}-assets
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [PUT]
            AllowedHeaders: ['Content-Type']
            MaxAge: 300

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${AssetsBucket.Arn}/maps/*'

  # =========================================================================
  # DynamoDB Tables (14 tables, all on-demand)
  # =========================================================================

  # 1. Users
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: clan
          AttributeType: S
        - AttributeName: todayXp
          AttributeType: N
        - AttributeName: email
          AttributeType: S
        - AttributeName: playerCode
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ClanIndex
          KeySchema:
            - AttributeName: clan
              KeyType: HASH
            - AttributeName: todayXp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: PlayerCodeIndex
          KeySchema:
            - AttributeName: playerCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # 2. Clans
  ClansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-clans
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clanId
          AttributeType: S
      KeySchema:
        - AttributeName: clanId
          KeyType: HASH

  # 3. Locations
  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: locationId
          AttributeType: S
      KeySchema:
        - AttributeName: locationId
          KeyType: HASH

  # 4. Daily Config
  DailyConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-daily-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH

  # 5. Player Assignments
  PlayerAssignmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-player-assignments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: dateUserId
          AttributeType: S
      KeySchema:
        - AttributeName: dateUserId
          KeyType: HASH

  # 6. Game Sessions
  GameSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-game-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # 7. Player Locks
  PlayerLocksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-player-locks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: dateUserLocation
          AttributeType: S
      KeySchema:
        - AttributeName: dateUserLocation
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # 8. Captured Spaces
  CapturedSpacesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-captured-spaces
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: spaceId
          AttributeType: S
        - AttributeName: season
          AttributeType: S
        - AttributeName: dateCaptured
          AttributeType: S
      KeySchema:
        - AttributeName: spaceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SeasonIndex
          KeySchema:
            - AttributeName: season
              KeyType: HASH
            - AttributeName: dateCaptured
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # 9. Asset Catalog
  AssetCatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-asset-catalog
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: assetId
          AttributeType: S
      KeySchema:
        - AttributeName: assetId
          KeyType: HASH

  # 10. Player Assets
  PlayerAssetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-player-assets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userAssetId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: obtainedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userAssetId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserAssetsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: obtainedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # 11. Space Decorations
  SpaceDecorationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-space-decorations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userSpaceId
          AttributeType: S
      KeySchema:
        - AttributeName: userSpaceId
          KeyType: HASH

  # 12. Map Calibration
  MapCalibrationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-map-calibration
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: calibrationId
          AttributeType: S
      KeySchema:
        - AttributeName: calibrationId
          KeyType: HASH

  # 13. Admin Notifications
  AdminNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-admin-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH

  # 14. WebSocket Connections
  WsConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-ws-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # 15. Roster
  RosterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-roster
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # 16. Check-Ins (free-roam research data)
  CheckInsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-checkins
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: checkInId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: checkInId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: DateIndex
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # 17. Admin Audit
  AdminAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-admin-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auditId
          AttributeType: S
      KeySchema:
        - AttributeName: auditId
          KeyType: HASH

  # 18. Location Master Config
  LocationMasterConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-location-master-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: locationId
          AttributeType: S
      KeySchema:
        - AttributeName: locationId
          KeyType: HASH

  # 19. Cluster Weight Config
  ClusterWeightConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-cluster-weight-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: configId
          AttributeType: S
      KeySchema:
        - AttributeName: configId
          KeyType: HASH

  ClusteringRunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub grovewars-${Stage}-clustering-runs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # =========================================================================
  # Lambda Authorizer
  # =========================================================================
  LambdaAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-lambdaAuthorizer
      CodeUri: functions/auth/
      Handler: lambdaAuthorizer.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - kms:Decrypt
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grovewars/${Stage}/fcm-service-account
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - lambdaAuthorizer.ts
        External:
          - '@aws-sdk/*'

  # =========================================================================
  # Auth Functions (NO authorizer)
  # =========================================================================
  GoogleLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-googleLogin
      CodeUri: functions/auth/
      Handler: googleLogin.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RosterTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerAssignmentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DailyConfigTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - kms:Decrypt
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grovewars/${Stage}/fcm-service-account
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/google-login
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - googleLogin.ts
        External:
          - '@aws-sdk/*'

  # =========================================================================
  # Admin Auth (NO authorizer — public endpoint)
  # =========================================================================
  AdminGoogleLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-adminGoogleLogin
      CodeUri: functions/auth/
      Handler: adminGoogleLogin.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - kms:Decrypt
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grovewars/${Stage}/fcm-service-account
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin/auth/google-login
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - adminGoogleLogin.ts
        External:
          - '@aws-sdk/*'

  # =========================================================================
  # Player Functions
  # =========================================================================
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-getProfile
      CodeUri: functions/player/
      Handler: getProfile.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ClansTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/profile
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - getProfile.ts
        External:
          - '@aws-sdk/*'

  SearchPlayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-searchPlayer
      CodeUri: functions/player/
      Handler: searchPlayer.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/search
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - searchPlayer.ts
        External:
          - '@aws-sdk/*'

  ResetPlayerStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-resetPlayerState
      CodeUri: functions/debug/
      Handler: resetPlayerState.handler
      Environment:
        Variables:
          STAGE: !Ref Stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerLocksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerAssignmentsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /debug/reset-player-state
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - resetPlayerState.ts
        External:
          - '@aws-sdk/*'

  UpdateAvatarFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-updateAvatar
      CodeUri: functions/player/
      Handler: updateAvatar.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/avatar
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - updateAvatar.ts
        External:
          - '@aws-sdk/*'

  UpdateFcmTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-updateFcmToken
      CodeUri: functions/player/
      Handler: updateFcmToken.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/fcm-token
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - updateFcmToken.ts
        External:
          - '@aws-sdk/*'

  GetAssetsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-getAssets
      CodeUri: functions/player/
      Handler: getAssets.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerAssetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AssetCatalogTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/assets
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - getAssets.ts
        External:
          - '@aws-sdk/*'

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-getStats
      CodeUri: functions/player/
      Handler: getStats.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CapturedSpacesTable
      Events:
        Api:
          Type: Api
          Properties:
