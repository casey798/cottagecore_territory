  # Daily Clustering — 7:45 AM IST (2:15 UTC), before dailyReset
  DailyClusteringRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub grovewars-${Stage}-daily-clustering
      Description: Daily clustering at 7:45 AM IST (2:15 UTC)
      ScheduleExpression: cron(15 2 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyClusteringFunction.Arn
          Id: DailyClusteringTarget

  DailyClusteringPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DailyClusteringFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyClusteringRule.Arn

  # Daily Reset — 8:00 AM IST (2:30 UTC)
