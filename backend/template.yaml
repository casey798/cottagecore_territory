        - DynamoDBCrudPolicy:
            TableName: !Ref DailyConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:ap-south-1:${AWS::AccountId}:${WebSocketApi}/${Stage}/POST/@connections/*
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - dailyScoring.ts
        External:
          - '@aws-sdk/*'

  AssetExpiryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-assetExpiry
      CodeUri: functions/scheduled/
      Handler: assetExpiry.handler
      Timeout: 120
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerAssetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SpaceDecorationsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - assetExpiry.ts
        External:
          - '@aws-sdk/*'

  AssetExpiryWarningFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub grovewars-${Stage}-assetExpiryWarning
      CodeUri: functions/scheduled/
      Handler: assetExpiryWarning.handler
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.ap-south-1.amazonaws.com/${Stage}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerAssetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:ap-south-1:${AWS::AccountId}:${WebSocketApi}/${Stage}/POST/@connections/*
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - assetExpiryWarning.ts
        External:
          - '@aws-sdk/*'

  # =========================================================================
  # EventBridge Rules (separate resources — Lambda first, then rule, then permission)
  # =========================================================================

  # Daily Reset — 8:00 AM IST (2:30 UTC)
  DailyResetRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub grovewars-${Stage}-daily-reset
      Description: Daily reset at 8:00 AM IST (2:30 UTC)
      ScheduleExpression: cron(30 2 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyResetFunction.Arn
          Id: DailyResetTarget

  DailyResetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DailyResetFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyResetRule.Arn

  # Daily Scoring — 6:00 PM IST (12:30 UTC)
  DailyScoringRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub grovewars-${Stage}-daily-scoring
      Description: Daily scoring at 6:00 PM IST (12:30 UTC)
      ScheduleExpression: cron(30 12 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyScoringFunction.Arn
          Id: DailyScoringTarget

  DailyScoringPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DailyScoringFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyScoringRule.Arn

  # Asset Expiry — midnight IST (18:30 UTC)
  AssetExpiryRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub grovewars-${Stage}-asset-expiry
      Description: Asset expiry at midnight IST (18:30 UTC)
      ScheduleExpression: cron(30 18 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt AssetExpiryFunction.Arn
          Id: AssetExpiryTarget

  AssetExpiryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AssetExpiryFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AssetExpiryRule.Arn

  # Asset Expiry Warning — 9:00 PM IST (15:30 UTC)
  AssetExpiryWarningRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub grovewars-${Stage}-asset-expiry-warning
      Description: Asset expiry warning at 9:00 PM IST (15:30 UTC)
      ScheduleExpression: cron(30 15 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt AssetExpiryWarningFunction.Arn
          Id: AssetExpiryWarningTarget

  AssetExpiryWarningPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AssetExpiryWarningFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AssetExpiryWarningRule.Arn

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RestApiUrl:
    Description: REST API Gateway URL
    Value: !Sub https://${RestApi}.execute-api.ap-south-1.amazonaws.com/${Stage}

  WebSocketApiUrl:
    Description: WebSocket API Gateway URL
    Value: !Sub wss://${WebSocketApi}.execute-api.ap-south-1.amazonaws.com/${Stage}

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient

  AssetsBucketName:
    Description: S3 Assets Bucket Name
    Value: !Ref AssetsBucket
